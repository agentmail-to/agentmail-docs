# yaml-language-server: $schema=https://raw.githubusercontent.com/fern-api/fern/main/fern.schema.json

imports:
  global: __package__.yml
  inboxes: inboxes/__package__.yml

types:
  MetricEventType:
    enum:
      - name: MESSAGE_SENT
        value: message.sent
      - name: MESSAGE_DELIVERED
        value: message.delivered
      - name: MESSAGE_BOUNCED
        value: message.bounced
      - name: MESSAGE_DELAYED
        value: message.delayed
      - name: MESSAGE_REJECTED
        value: message.rejected
      - name: MESSAGE_COMPLAINED
        value: message.complained
      - name: MESSAGE_RECEIVED
        value: message.received
    docs: Type of metric event.

  MetricEventTypes:
    type: list<MetricEventType>
    docs: List of metric event types to query.

  Start:
    type: datetime
    docs: Start timestamp for the query.

  End:
    type: datetime
    docs: End timestamp for the query.

  Period:
    type: string
    docs: Period in number of seconds for the query.

  MetricLimit:
    type: integer
    docs: Limit on number of buckets to return.

  Descending:
    type: boolean
    docs: Sort in descending order.

  MetricBucket:
    properties:
      timestamp:
        type: datetime
        docs: Timestamp of the bucket.
      count:
        type: integer
        docs: Count of events in the bucket.

  QueryMetricsResponse:
    type: map<MetricEventType, list<MetricBucket>>
    docs: Metrics grouped by event type.

service:
  url: Http
  base-path: /metrics
  auth: true

  endpoints:
    query:
      method: GET
      path: ""
      display-name: Query Metrics
      docs: |
        **CLI:**
        ```bash
        agentmail metrics list
        ```
      request:
        name: QueryMetricsRequest
        query-parameters:
          event_types: optional<MetricEventTypes>
          start: optional<Start>
          end: optional<End>
          period: optional<Period>
          limit: optional<MetricLimit>
          descending: optional<Descending>
      response: QueryMetricsResponse
      errors:
        - global.ValidationError
