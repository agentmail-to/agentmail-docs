  /v0/inboxes/{inbox_id}/api-keys:
    get:
      x-fern-sdk-group-name:
      - inboxes
      - apiKeys
      x-fern-sdk-method-name: list
    post:
      x-fern-sdk-group-name:
      - inboxes
      - apiKeys
      x-fern-sdk-method-name: create
  /v0/inboxes/{inbox_id}/api-keys/{api_key_id}:
    delete:
      x-fern-sdk-group-name:
      - inboxes
      - apiKeys
      x-fern-sdk-method-name: delete
  /v0/inboxes/{inbox_id}/drafts:
