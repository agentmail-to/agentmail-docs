# Auto-generated overlay that maps AgentMail operationIds → nested CLI
# group + method names. Without this, the CLI surface ends up stuttered
# (e.g. `agentmail inboxes-messages inboxes-messages-list`) because the
# upstream spec uses flat tag names like `InboxesMessages` instead of
# x-fern-sdk-group-name. Regenerate from the spec by running the inline
# script in this directory's README.
#
