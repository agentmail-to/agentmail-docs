
# yaml-language-server: $schema=https://raw.githubusercontent.com/fern-api/fern/main/fern.schema.json

imports:
  global: ../__package__.yml
  events: ../events.yml

types:
  WebhookId:
    type: string
    docs: ID of webhook.

  ClientId:
    type: string
    docs: Client ID of webhook.

  Url:
    type: string
    docs: URL of webhook endpoint.

  Webhook:
    properties:
      webhook_id: WebhookId
      url: Url
      event_types: optional<events.EventTypes>
      pod_ids: optional<events.PodIds>
      inbox_ids: optional<events.InboxIds>
      secret:
        type: string
        docs: Secret for webhook signature verification.
      enabled:
        type: boolean
        docs: Webhook is enabled.
      updated_at:
        type: datetime
        docs: Time at which webhook was last updated.
      created_at:
        type: datetime
        docs: Time at which webhook was created.
      client_id: optional<ClientId>

  ListWebhooksResponse:
    properties:
      count: global.Count
      limit: optional<global.Limit>
      next_page_token: optional<global.PageToken>
      webhooks:
        type: list<Webhook>
        docs: Ordered by `created_at` descending.

  CreateWebhookRequest:
    properties:
      url: Url
      event_types:
        type: events.EventTypes
        docs: |
          Full list of event types this webhook should receive. At least one type is required. Send every type you
          want in this array (not incremental). See [Webhooks overview](https://docs.agentmail.to/webhooks-overview)
          for spam, blocked, and unauthenticated events and required permissions.
      pod_ids: optional<events.PodIds>
      inbox_ids: optional<events.InboxIds>
      client_id: optional<ClientId>

  UpdateWebhookRequest:
    properties:
      add_inbox_ids:
        type: optional<events.InboxIds>
        docs: Inbox IDs to subscribe to the webhook.
      remove_inbox_ids:
        type: optional<events.InboxIds>
        docs: Inbox IDs to unsubscribe from the webhook.
      add_pod_ids:
        type: optional<events.PodIds>
        docs: Pod IDs to subscribe to the webhook.
      remove_pod_ids:
        type: optional<events.PodIds>
        docs: Pod IDs to unsubscribe from the webhook.
      event_types:
        type: optional<events.EventTypes>
        docs: |
          When you send a non-empty list, it replaces the webhook's subscribed event types in full (the same
          "set the list" behavior as create). It is not a merge or diff: include every event type you want after
          the update. Sending a one-element array means the webhook will only receive that one type afterward.
          Omit this field or send an empty array to leave event types unchanged. Clearing all types with an empty
          list is not supported. Subscribing to `message.received.spam`, `message.received.blocked`, or
          `message.received.unauthenticated` requires the matching label permission on the API key.

service:
  url: Http
  base-path: /webhooks
  auth: true

  endpoints:
    list:
      method: GET
      path: ""
      display-name: List Webhooks
      docs: |
        **CLI:**
        ```bash
        agentmail webhooks list
        ```
      request:
        name: ListWebhooksRequest
        query-parameters:
          limit: optional<global.Limit>
          page_token: optional<global.PageToken>
          ascending: optional<global.Ascending>
      response: ListWebhooksResponse

    get:
      method: GET
      path: /{webhook_id}
      display-name: Get Webhook
      docs: |
        **CLI:**
        ```bash
        agentmail webhooks get --webhook-id <webhook_id>
        ```
      path-parameters:
        webhook_id: WebhookId
      response: Webhook
      errors:
        - global.NotFoundError

    create:
      method: POST
      path: ""
      display-name: Create Webhook
      docs: |
        **CLI:**
        ```bash
        agentmail webhooks create --url https://example.com/webhook --event-type message.received
        ```
      request: CreateWebhookRequest
      response: Webhook
      errors:
        - global.ValidationError

    update:
      method: PATCH
      path: /{webhook_id}
      display-name: Update Webhook
      docs: |
        Update inbox or pod subscriptions, or replace the webhook's `event_types` in full when you pass a
        non-empty `event_types` array (see request field docs). Inbox and pod changes use add/remove lists.

        **CLI:**
        ```bash
        agentmail webhooks update --webhook-id <webhook_id> --add-inbox-id <inbox_id>
        ```
      path-parameters:
        webhook_id: WebhookId
      request: UpdateWebhookRequest
      response: Webhook
      errors:
        - global.NotFoundError
        - global.ValidationError

    delete:
      method: DELETE
      path: /{webhook_id}
      display-name: Delete Webhook
      docs: |
        **CLI:**
        ```bash
        agentmail webhooks delete --webhook-id <webhook_id>
        ```
      path-parameters:
        webhook_id: WebhookId
      errors:
        - global.NotFoundError
