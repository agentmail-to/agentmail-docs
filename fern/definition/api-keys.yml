# yaml-language-server: $schema=https://raw.githubusercontent.com/fern-api/fern/main/fern.schema.json

imports:
  global: __package__.yml

types:
  ApiKeyId:
    type: string
    docs: ID of api key.

  Prefix:
    type: string
    docs: Prefix of api key.

  Name:
    type: string
    docs: Name of api key.

  CreatedAt:
    type: datetime
    docs: Time at which api key was created.

  ApiKeyPermissions:
    docs: |
      Granular permissions for an API key. Each field is an independent
      boolean grant — only fields set to `true` are granted. A caller cannot
      grant a permission they do not themselves hold; per-field escalation is
      rejected with 403. See the `permissions` field on `Create API Key` and
      `Update API Key` for how `null`, omitted, and populated values are
      interpreted on each endpoint.
    properties:
      inbox_read:
        type: optional<boolean>
        docs: Read inbox details.
      inbox_create:
        type: optional<boolean>
        docs: Create new inboxes.
      inbox_update:
        type: optional<boolean>
        docs: Update inbox settings.
      inbox_delete:
        type: optional<boolean>
        docs: Delete inboxes.
      message_read:
        type: optional<boolean>
        docs: Read messages.
      message_send:
        type: optional<boolean>
        docs: Send messages.
      message_update:
        type: optional<boolean>
        docs: Update message labels.
      message_delete:
        type: optional<boolean>
        docs: Delete messages.
      label_spam_read:
        type: optional<boolean>
        docs: Access messages labeled spam.
      label_blocked_read:
        type: optional<boolean>
        docs: Access messages labeled blocked.
      label_trash_read:
        type: optional<boolean>
        docs: Access messages labeled trash.
      draft_read:
        type: optional<boolean>
        docs: Read drafts.
      draft_create:
        type: optional<boolean>
        docs: Create drafts.
      draft_update:
        type: optional<boolean>
        docs: Update drafts.
      draft_delete:
        type: optional<boolean>
        docs: Delete drafts.
      draft_send:
        type: optional<boolean>
        docs: Send drafts.
      webhook_read:
        type: optional<boolean>
        docs: Read webhook configurations.
      webhook_create:
        type: optional<boolean>
        docs: Create webhooks.
      webhook_update:
        type: optional<boolean>
        docs: Update webhooks.
      webhook_delete:
        type: optional<boolean>
        docs: Delete webhooks.
      domain_read:
        type: optional<boolean>
        docs: Read domain details.
      domain_create:
        type: optional<boolean>
        docs: Create domains.
      domain_update:
        type: optional<boolean>
        docs: Update domains.
      domain_delete:
        type: optional<boolean>
        docs: Delete domains.
      list_entry_read:
        type: optional<boolean>
        docs: Read list entries.
      list_entry_create:
        type: optional<boolean>
        docs: Create list entries.
      list_entry_delete:
        type: optional<boolean>
        docs: Delete list entries.
      metrics_read:
        type: optional<boolean>
        docs: Read metrics.
      api_key_read:
        type: optional<boolean>
        docs: Read API keys.
      api_key_create:
        type: optional<boolean>
        docs: Create API keys.
      api_key_update:
        type: optional<boolean>
        docs: Update API keys.
      api_key_delete:
        type: optional<boolean>
        docs: Delete API keys.
      pod_read:
        type: optional<boolean>
        docs: Read pods.
      pod_create:
        type: optional<boolean>
        docs: Create pods.
      pod_delete:
        type: optional<boolean>
        docs: Delete pods.

  ApiKey:
    properties:
      api_key_id: ApiKeyId
      prefix: Prefix
      name: Name
      pod_id:
        type: optional<string>
        docs: Pod ID the api key is scoped to. If set, the key can only access resources within this pod.
      inbox_id:
        type: optional<string>
        docs: Inbox ID the api key is scoped to. If set, the key can only access resources within this inbox.
      used_at:
        type: optional<datetime>
        docs: Time at which api key was last used.
      permissions: optional<ApiKeyPermissions>
      created_at: CreatedAt

  CreateApiKeyResponse:
    properties:
      api_key_id: ApiKeyId
      api_key:
        type: string
        docs: API key.
      prefix: Prefix
      name: Name
      pod_id:
        type: optional<string>
        docs: Pod ID the api key is scoped to.
      inbox_id:
        type: optional<string>
        docs: Inbox ID the api key is scoped to.
      permissions: optional<ApiKeyPermissions>
      created_at: CreatedAt

  ListApiKeysResponse:
    properties:
      count: global.Count
      next_page_token: optional<global.PageToken>
      api_keys:
        type: list<ApiKey>
        docs: Ordered by `created_at` descending.

  CreateApiKeyRequest:
    properties:
      name: Name
      permissions:
        type: optional<ApiKeyPermissions>
        docs: |
          Permissions for the new key. Behavior depends on the value:
          - Omitted: the new key inherits the creator's permissions
            (unrestricted creators get an unrestricted child; restricted
            creators get a child with their own granular permissions).
          - `null`: makes the new key unrestricted. Only allowed when the
            creator is themselves unrestricted; restricted creators sending
            `null` get a 403.
          - Populated object: grants the listed `true` fields, intersected
            with the creator's own permissions. Per-field escalation
            (granting a permission the creator doesn't hold) is rejected
            with 403.

  UpdateApiKeyRequest:
    docs: At least one of `name` or `permissions` must be provided.
    properties:
      name: optional<Name>
      permissions:
        type: optional<ApiKeyPermissions>
        docs: |
          Permissions to apply. Behavior depends on the value:
          - Omitted: the key's permissions are unchanged.
          - `null`: clears all restrictions and makes the key unrestricted.
            Only allowed when the caller is themselves unrestricted;
            restricted callers sending `null` get a 403. The same gate
            applies when the target key is currently unrestricted and the
            caller tries to make it restricted — only unrestricted callers
            can flip a key between restricted and unrestricted.
          - Populated object: merged with the stored permissions — fields
            not mentioned are preserved, mentioned fields overwrite.
            Per-field escalation (granting a permission the caller doesn't
            hold) is rejected with 403.

service:
  url: Http
  base-path: /api-keys
  auth: true

  endpoints:
    list:
      method: GET
      path: ""
      display-name: List API Keys
      request:
        name: ListApiKeysRequest
        query-parameters:
          limit: optional<global.Limit>
          page_token: optional<global.PageToken>
          ascending: optional<global.Ascending>
      response: ListApiKeysResponse

    create:
      method: POST
      path: ""
      display-name: Create API Key
      request: CreateApiKeyRequest
      response: CreateApiKeyResponse
      errors:
        - global.ValidationError
        - ForbiddenError

    update:
      method: PATCH
      path: /{api_key_id}
      display-name: Update API Key
      path-parameters:
        api_key_id: ApiKeyId
      request: UpdateApiKeyRequest
      response: ApiKey
      errors:
        - global.NotFoundError
        - global.ValidationError
        - ForbiddenError

    delete:
      method: DELETE
      path: /{api_key_id}
      display-name: Delete API Key
      path-parameters:
        api_key_id: ApiKeyId
      errors:
        - global.NotFoundError

errors:
  ForbiddenError:
    status-code: 403
    type: global.ErrorResponse
