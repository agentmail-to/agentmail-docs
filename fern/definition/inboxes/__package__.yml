# yaml-language-server: $schema=https://raw.githubusercontent.com/fern-api/fern/main/fern.schema.json

navigation:
  - threads.yml
  - messages.yml
  - drafts.yml
  - lists.yml
  - metrics.yml
  - events.yml
  - api-keys.yml

imports:
  global: ../__package__.yml
  pods: ../pods/__package__.yml

types:
  InboxId:
    type: string
    docs: The ID of the inbox.

  Email:
    type: string
    docs: Email address of the inbox.

  DisplayName:
    type: string
    docs: "Display name: `Display Name <username@domain.com>`."

  ClientId:
    type: string
    docs: Client ID of inbox.

  MetadataValue:
    discriminated: false
    union:
      - string
      - double
      - boolean
    docs: A metadata value. May be a string, number, or boolean.

  Metadata:
    type: map<string, MetadataValue>
    docs: |
      Custom key-value pairs attached to the inbox. Up to 256 keys. Keys and
      string values are each limited to 256 characters. When updating metadata,
      send a key with a null value to remove that key.

  UpdateMetadata:
    type: map<string, nullable<MetadataValue>>
    docs: |
      Custom key-value pairs to merge into the inbox's existing metadata. A
      value may be a string, number, boolean, or null. Setting a key to null
      removes it. Up to 256 keys; keys and string values are each limited to
      256 characters.

  Inbox:
    properties:
      pod_id: pods.PodId
      inbox_id: InboxId
      email: Email
      display_name: optional<DisplayName>
      client_id: optional<ClientId>
      metadata:
        type: optional<Metadata>
        docs: Custom metadata attached to the inbox.
      updated_at:
        type: datetime
        docs: Time at which inbox was last updated.
      created_at:
        type: datetime
        docs: Time at which inbox was created.

  ListInboxesResponse:
    properties:
      count: global.Count
      limit: optional<global.Limit>
      next_page_token: optional<global.PageToken>
      inboxes:
        type: list<Inbox>
        docs: Ordered by `created_at` descending.

  CreateInboxRequest:
    properties:
      username:
        type: optional<string>
        docs: Username of address. Randomly generated if not specified.
      domain:
        type: optional<string>
        docs: |
          Domain of address. Must be a verified domain, or any subdomain of a
          verified domain that has subdomains enabled (e.g., `bot.example.com`).
          Defaults to `agentmail.to`.
      display_name: optional<DisplayName>
      client_id: optional<ClientId>
      metadata:
        type: optional<Metadata>
        docs: Custom metadata to attach to the inbox.

  UpdateInboxRequest:
    properties:
      display_name: optional<DisplayName>
      metadata:
        type: optional<nullable<UpdateMetadata>>
        docs: |
          Metadata to merge into the inbox's existing metadata. Keys you include
          are added or overwritten; keys you omit are left unchanged. To remove a
          single key, send it with a null value. To clear all metadata, send
          `metadata` as null. Sending an empty object is rejected; use null to
          clear. Each update must include at least one of `display_name` or
          `metadata`.

service:
  url: Http
  base-path: /inboxes
  auth: true

  endpoints:
    list:
      method: GET
      path: ""
      display-name: List Inboxes
      docs: |
        **CLI:**
        ```bash
        agentmail inboxes list
        ```
      request:
        name: ListInboxesRequest
        query-parameters:
          limit: optional<global.Limit>
          page_token: optional<global.PageToken>
          ascending: optional<global.Ascending>
      response: ListInboxesResponse

    get:
      method: GET
      path: /{inbox_id}
      display-name: Get Inbox
      docs: |
        **CLI:**
        ```bash
        agentmail inboxes get --inbox-id <inbox_id>
        ```
      path-parameters:
        inbox_id: InboxId
      response: Inbox
      errors:
        - global.NotFoundError

    create:
      method: POST
      path: ""
      display-name: Create Inbox
      docs: |
        **CLI:**
        ```bash
        agentmail inboxes create --display-name "My Agent" --username myagent --domain agentmail.to
        ```
      request: optional<CreateInboxRequest>
      response: Inbox
      errors:
        - global.ValidationError
        - global.UnprocessableError

    update:
      method: PATCH
      path: /{inbox_id}
      display-name: Update Inbox
      docs: |
        **CLI:**
        ```bash
        agentmail inboxes update --inbox-id <inbox_id> --display-name "Updated Name"
        ```
      path-parameters:
        inbox_id: InboxId
      request:
        body:
          type: UpdateInboxRequest
          docs: Expects an object; provide at least one of `display_name` or `metadata`.
      response: Inbox
      errors:
        - global.NotFoundError
        - global.ValidationError

    delete:
      method: DELETE
      path: /{inbox_id}
      display-name: Delete Inbox
      docs: |
        **CLI:**
        ```bash
        agentmail inboxes delete --inbox-id <inbox_id>
        ```
      path-parameters:
        inbox_id: InboxId
      errors:
        - global.NotFoundError
