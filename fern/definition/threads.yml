# yaml-language-server: $schema=https://raw.githubusercontent.com/fern-api/fern/main/fern.schema.json

imports:
  global: __package__.yml
  inboxes: inboxes/__package__.yml
  messages: messages.yml
  attachments: attachments.yml

types:
  ThreadId:
    type: string
    docs: ID of thread.

  ThreadLabels:
    type: list<string>
    docs: Labels of thread.

  ThreadTimestamp:
    type: datetime
    docs: Timestamp of last sent or received message.

  ThreadReceivedTimestamp:
    type: datetime
    docs: Timestamp of last received message.

  ThreadSentTimestamp:
    type: datetime
    docs: Timestamp of last sent message.

  ThreadSenders:
    type: list<string>
    docs: Senders in thread. In format `username@domain.com` or `Display Name <username@domain.com>`.

  ThreadRecipients:
    type: list<string>
    docs: Recipients in thread. In format `username@domain.com` or `Display Name <username@domain.com>`.

  ThreadSubject:
    type: string
    docs: Subject of thread.

  ThreadPreview:
    type: string
    docs: Text preview of last message in thread.

  ThreadAttachments:
    type: list<attachments.Attachment>
    docs: Attachments in thread.

  ThreadLastMessageId:
    type: string
    docs: ID of last message in thread.

  ThreadMessageCount:
    type: integer
    docs: Number of messages in thread.

  ThreadSize:
    type: integer
    docs: Size of thread in bytes.

  ThreadUpdatedAt:
    type: datetime
    docs: Time at which thread was last updated.

  ThreadCreatedAt:
    type: datetime
    docs: Time at which thread was created.

  ThreadItem:
    properties:
      inbox_id: inboxes.InboxId
      thread_id: ThreadId
      labels: ThreadLabels
      timestamp: ThreadTimestamp
      received_timestamp: optional<ThreadReceivedTimestamp>
      sent_timestamp: optional<ThreadSentTimestamp>
      senders: ThreadSenders
      recipients: ThreadRecipients
      subject: optional<ThreadSubject>
      preview: optional<ThreadPreview>
      attachments: optional<ThreadAttachments>
      last_message_id: ThreadLastMessageId
      message_count: ThreadMessageCount
      size: ThreadSize
      updated_at: ThreadUpdatedAt
      created_at: ThreadCreatedAt

  Thread:
    properties:
      inbox_id: inboxes.InboxId
      thread_id: ThreadId
      labels: ThreadLabels
      timestamp: ThreadTimestamp
      received_timestamp: optional<ThreadReceivedTimestamp>
      sent_timestamp: optional<ThreadSentTimestamp>
      senders: ThreadSenders
      recipients: ThreadRecipients
      subject: optional<ThreadSubject>
      preview: optional<ThreadPreview>
      attachments: optional<ThreadAttachments>
      last_message_id: ThreadLastMessageId
      message_count: ThreadMessageCount
      size: ThreadSize
      updated_at: ThreadUpdatedAt
      created_at: ThreadCreatedAt
      messages:
        type: list<messages.Message>
        docs: Messages in thread. Ordered by `timestamp` ascending.

  UpdateThreadRequest:
    properties:
      add_labels:
        type: optional<list<string>>
        docs: Labels to add to thread. Cannot be system labels.
      remove_labels:
        type: optional<list<string>>
        docs: Labels to remove from thread. Cannot be system labels. Takes priority over `add_labels` (in the event of duplicate labels passed in).

  UpdateThreadResponse:
    properties:
      thread_id: ThreadId
      labels: ThreadLabels

  ListThreadsResponse:
    properties:
      count: global.Count
      limit: optional<global.Limit>
      next_page_token: optional<global.PageToken>
      threads:
        type: list<ThreadItem>
        docs: Ordered by `timestamp` descending.

  SearchThreadHighlights:
    docs: |
      Matched fragments per field on a thread search result, with matched terms
      wrapped in `**`. A field key is present only when the query matched that
      field, so the present keys also tell you which fields produced the hit.
    properties:
      from:
        type: optional<list<string>>
        docs: Matched fragments from a sender address in the thread.
      recipients:
        type: optional<list<string>>
        docs: Matched fragments from a recipient address in the thread (to, cc, or bcc).
      subject:
        type: optional<list<string>>
        docs: Matched fragments from the subject.
      text:
        type: optional<list<string>>
        docs: Matched fragments from a message body in the thread.

  SearchThreadItem:
    extends: ThreadItem
    properties:
      highlights:
        type: optional<SearchThreadHighlights>
        docs: Matched fragments per field. Present only when the query matched an indexed field.

  SearchThreadsResponse:
    properties:
      count: global.Count
      limit: optional<global.Limit>
      next_page_token: optional<global.PageToken>
      threads:
        type: list<SearchThreadItem>
        docs: Ordered by relevance, best match first.

service:
  url: Http
  base-path: /threads
  auth: true

  endpoints:
    list:
      method: GET
      path: ""
      display-name: List Threads
      docs: |
        Lists threads, most recent first. Pass `senders`, `recipients`, or
        `subject` to filter by substring. Filtered requests are served by
        search, which caps `limit` at 100. For relevance-ranked full-text
        search across senders, recipients, subject, and message body, use
        `Search Threads`.

        **CLI:**
        ```bash
        agentmail threads list
        ```
      request:
        name: ListThreadsRequest
        query-parameters:
          limit: optional<global.Limit>
          page_token: optional<global.PageToken>
          labels: optional<global.Labels>
          before: optional<global.Before>
          after: optional<global.After>
          ascending: optional<global.Ascending>
          include_spam: optional<global.IncludeSpam>
          include_blocked: optional<global.IncludeBlocked>
          include_unauthenticated: optional<global.IncludeUnauthenticated>
          include_trash: optional<global.IncludeTrash>
          senders:
            type: optional<list<string>>
            docs: Filter to threads whose senders contain this value (substring match). Repeatable; all values must match.
          recipients:
            type: optional<list<string>>
            docs: Filter to threads whose recipients contain this value (substring match). Repeatable; all values must match.
          subject:
            type: optional<list<string>>
            docs: Filter to threads whose subject contains this value (substring match). Repeatable; all values must match.
      response: ListThreadsResponse
      errors:
        - global.NotFoundError

    search:
      method: GET
      path: /search
      display-name: Search Threads
      docs: |
        Full-text search across threads in the organization, ranked by
        relevance. The query is matched against senders, recipients, and
        subject (substring) and the message body (tokenized full text). Spam,
        trash, blocked, and unauthenticated threads are always excluded.
        `limit` cannot exceed 100.
      request:
        name: SearchThreadsRequest
        query-parameters:
          q: global.Query
          limit: optional<global.Limit>
          page_token: optional<global.PageToken>
          before: optional<global.Before>
          after: optional<global.After>
      response: SearchThreadsResponse
      errors:
        - global.ValidationError
        - global.NotFoundError

    get:
      method: GET
      path: /{thread_id}
      display-name: Get Thread
      docs: |
        **CLI:**
        ```bash
        agentmail threads get --thread-id <thread_id>
        ```
      path-parameters:
        thread_id: ThreadId
      response: Thread
      errors:
        - global.NotFoundError

    getAttachment:
      method: GET
      path: /{thread_id}/attachments/{attachment_id}
      display-name: Get Attachment
      docs: |
        **CLI:**
        ```bash
        agentmail threads get-attachment --thread-id <thread_id> --attachment-id <attachment_id>
        ```
      path-parameters:
        thread_id: ThreadId
        attachment_id: attachments.AttachmentId
      response: attachments.AttachmentResponse
      errors:
        - global.NotFoundError

    update:
      method: PATCH
      path: /{thread_id}
      display-name: Update Thread
      docs: Updates thread labels. Cannot add or remove system labels (sent, received, bounced, etc.). Rejects requests with a `422` for threads with 100 or more messages.
      path-parameters:
        thread_id: ThreadId
      request: UpdateThreadRequest
      response: UpdateThreadResponse
      errors:
        - global.ValidationError
        - global.NotFoundError
        - global.UnprocessableError

    delete:
      method: DELETE
      path: /{thread_id}
      display-name: Delete Thread
      docs: |
        Permanently deletes a thread and all of its messages.

        **CLI:**
        ```bash
        agentmail threads delete --thread-id <thread_id>
        ```
      path-parameters:
        thread_id: ThreadId
      errors:
        - global.NotFoundError
