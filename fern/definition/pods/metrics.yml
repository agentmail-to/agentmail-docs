# yaml-language-server: $schema=https://raw.githubusercontent.com/fern-api/fern/main/fern.schema.json

imports:
  global: ../__package__.yml
  pods: __package__.yml
  metrics: ../metrics.yml

service:
  url: Http
  base-path: /pods/{pod_id}/metrics
  path-parameters:
    pod_id: pods.PodId
  auth: true

  endpoints:
    query:
      method: GET
      path: ""
      display-name: Query Metrics
      request:
        name: QueryMetricsRequest
        query-parameters:
          event_types: optional<metrics.MetricEventTypes>
          start: optional<metrics.StartTimestamp>
          end: optional<metrics.EndTimestamp>
          period: optional<metrics.Period>
          limit: optional<metrics.Limit>
          descending: optional<metrics.Descending>
      response: metrics.QueryMetricsResponse
      errors:
        - global.ValidationError
