# yaml-language-server: $schema=https://raw.githubusercontent.com/fern-api/fern/main/fern.schema.json

imports:
  global: ../__package__.yml
  pods: __package__.yml
  api-keys: ../api-keys.yml

service:
  url: Http
  base-path: /pods/{pod_id}/api-keys
  path-parameters:
    pod_id: pods.PodId
  auth: true

  endpoints:
    list:
      method: GET
      path: ""
      display-name: List API Keys
      docs: |
        **CLI:**
        ```bash
        agentmail pods:api-keys list --pod-id <pod_id>
        ```
      request:
        name: ListApiKeysRequest
        query-parameters:
          limit: optional<global.Limit>
          page_token: optional<global.PageToken>
      response: api-keys.ListApiKeysResponse
      errors:
        - global.NotFoundError

    create:
      method: POST
      path: ""
      display-name: Create API Key
      docs: |
        **CLI:**
        ```bash
        agentmail pods:api-keys create --pod-id <pod_id> --name "My Key"
        ```
      request: api-keys.CreateApiKeyRequest
      response: api-keys.CreateApiKeyResponse
      errors:
        - global.NotFoundError
        - global.ValidationError

    update:
      method: PATCH
      path: /{api_key_id}
      display-name: Update API Key
      path-parameters:
        api_key_id: api-keys.ApiKeyId
      request: api-keys.UpdateApiKeyRequest
      response: api-keys.ApiKey
      errors:
        - global.NotFoundError
        - global.ValidationError

    delete:
      method: DELETE
      path: /{api_key_id}
      display-name: Delete API Key
      docs: |
        **CLI:**
        ```bash
        agentmail pods:api-keys delete --pod-id <pod_id> --api-key-id <api_key_id>
        ```
      path-parameters:
        api_key_id: api-keys.ApiKeyId
      errors:
        - global.NotFoundError
