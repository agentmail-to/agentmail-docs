# yaml-language-server: $schema=https://raw.githubusercontent.com/fern-api/fern/main/fern.schema.json

imports:
  global: ../__package__.yml
  pods: __package__.yml
  inboxes: ../inboxes/__package__.yml

service:
  url: Http
  base-path: /pods/{pod_id}/inboxes
  path-parameters:
    pod_id: pods.PodId
  auth: true

  endpoints:
    list:
      method: GET
      path: ""
      display-name: List Inboxes
      docs: |
        **CLI:**
        ```bash
        agentmail pods:inboxes list --pod-id <pod_id>
        ```
      request:
        name: ListInboxesRequest
        query-parameters:
          limit: optional<global.Limit>
          page_token: optional<global.PageToken>
          ascending: optional<global.Ascending>
      response: inboxes.ListInboxesResponse
      errors:
        - global.NotFoundError

    get:
      method: GET
      path: /{inbox_id}
      display-name: Get Inbox
      docs: |
        **CLI:**
        ```bash
        agentmail pods:inboxes retrieve --pod-id <pod_id> --inbox-id <inbox_id>
        ```
      path-parameters:
        inbox_id: inboxes.InboxId
      response: inboxes.Inbox
      errors:
        - global.NotFoundError

    create:
      method: POST
      path: ""
      display-name: Create Inbox
      docs: |
        **CLI:**
        ```bash
        agentmail pods:inboxes create --pod-id <pod_id> --username myagent --domain example.com
        ```
      request: inboxes.CreateInboxRequest
      response: inboxes.Inbox
      errors:
        - global.ValidationError

    update:
      method: PATCH
      path: /{inbox_id}
      display-name: Update Inbox
      docs: |
        **CLI:**
        ```bash
        agentmail pods:inboxes update --pod-id <pod_id> --inbox-id <inbox_id>
        ```
      path-parameters:
        inbox_id: inboxes.InboxId
      request: inboxes.UpdateInboxRequest
      response: inboxes.Inbox
      errors:
        - global.NotFoundError

    delete:
      method: DELETE
      path: /{inbox_id}
      display-name: Delete Inbox
      docs: |
        **CLI:**
        ```bash
        agentmail pods:inboxes delete --pod-id <pod_id> --inbox-id <inbox_id>
        ```
      path-parameters:
        inbox_id: inboxes.InboxId
      errors:
        - global.NotFoundError
