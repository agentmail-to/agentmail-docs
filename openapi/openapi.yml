components:
  schemas:
    Limit:
      title: Limit
      type: integer
      description: Limit of number of items returned.
    Count:
      title: Count
      type: integer
      description: Number of items returned.
    PageToken:
      title: PageToken
      type: string
      description: Page token for pagination.
    Labels:
      title: Labels
      type: array
      items:
        type: string
      description: Labels to filter by.
    Before:
      title: Before
      type: string
      format: date-time
      description: Timestamp before which to filter by.
    After:
      title: After
      type: string
      format: date-time
      description: Timestamp after which to filter by.
    Ascending:
      title: Ascending
      type: boolean
      description: Sort in ascending temporal order.
    IncludeSpam:
      title: IncludeSpam
      type: boolean
      description: Include spam in results.
    IncludeBlocked:
      title: IncludeBlocked
      type: boolean
      description: Include blocked in results.
    IncludeUnauthenticated:
      title: IncludeUnauthenticated
      type: boolean
      description: Include unauthenticated in results.
    IncludeTrash:
      title: IncludeTrash
      type: boolean
      description: Include trash in results.
    OrganizationId:
      title: OrganizationId
      type: string
      description: ID of organization.
    Query:
      title: Query
      type: string
      description: |-
        Full-text search query. Matched against the sender, recipients, and
        subject (substring) and the message body (tokenized full text).
    ErrorName:
      title: ErrorName
      type: string
      description: Name of error.
    ErrorMessage:
      title: ErrorMessage
      type: string
      description: Error message.
    ErrorResponse:
      title: ErrorResponse
      type: object
      properties:
        name:
          $ref: '#/components/schemas/ErrorName'
        message:
          $ref: '#/components/schemas/ErrorMessage'
      required:
        - name
        - message
    ValidationErrorResponse:
      title: ValidationErrorResponse
      type: object
      properties:
        name:
          $ref: '#/components/schemas/ErrorName'
        errors:
          description: Validation errors.
      required:
        - name
        - errors
    inboxesInboxId:
      title: inboxesInboxId
      type: string
      description: The ID of the inbox.
    inboxesEmail:
      title: inboxesEmail
      type: string
      description: Email address of the inbox.
    inboxesDisplayName:
      title: inboxesDisplayName
      type: string
      description: 'Display name: `Display Name <username@domain.com>`.'
    inboxesClientId:
      title: inboxesClientId
      type: string
      description: Client ID of inbox.
    inboxesMetadataValue:
      title: inboxesMetadataValue
      oneOf:
        - type: string
        - type: number
          format: double
        - type: boolean
      description: A metadata value. May be a string, number, or boolean.
    inboxesMetadata:
      title: inboxesMetadata
      type: object
      additionalProperties:
        $ref: '#/components/schemas/inboxesMetadataValue'
      description: >-
        Custom key-value pairs attached to the inbox. Up to 256 keys. Keys and

        string values are each limited to 256 characters. When updating
        metadata,

        send a key with a null value to remove that key.
    inboxesUpdateMetadata:
      title: inboxesUpdateMetadata
      type: object
      additionalProperties:
        $ref: '#/components/schemas/inboxesMetadataValue'
        nullable: true
      description: |-
        Custom key-value pairs to merge into the inbox's existing metadata. A
        value may be a string, number, boolean, or null. Setting a key to null
        removes it. Up to 256 keys; keys and string values are each limited to
        256 characters.
    inboxesInbox:
      title: inboxesInbox
      type: object
      properties:
        pod_id:
          $ref: '#/components/schemas/podsPodId'
        inbox_id:
          $ref: '#/components/schemas/inboxesInboxId'
        email:
          $ref: '#/components/schemas/inboxesEmail'
        display_name:
          $ref: '#/components/schemas/inboxesDisplayName'
          nullable: true
        client_id:
          $ref: '#/components/schemas/inboxesClientId'
          nullable: true
        metadata:
          $ref: '#/components/schemas/inboxesMetadata'
          nullable: true
          description: Custom metadata attached to the inbox.
        updated_at:
          type: string
          format: date-time
          description: Time at which inbox was last updated.
        created_at:
          type: string
          format: date-time
          description: Time at which inbox was created.
      required:
        - pod_id
        - inbox_id
        - email
        - updated_at
        - created_at
    inboxesListInboxesResponse:
      title: inboxesListInboxesResponse
      type: object
      properties:
        count:
          $ref: '#/components/schemas/Count'
        limit:
          $ref: '#/components/schemas/Limit'
          nullable: true
        next_page_token:
          $ref: '#/components/schemas/PageToken'
          nullable: true
        inboxes:
          type: array
          items:
            $ref: '#/components/schemas/inboxesInbox'
          description: Ordered by `created_at` descending.
      required:
        - count
        - inboxes
    inboxesCreateInboxRequest:
      title: inboxesCreateInboxRequest
      type: object
      properties:
        username:
          type: string
          nullable: true
          description: Username of address. Randomly generated if not specified.
        domain:
          type: string
          nullable: true
          description: >-
            Domain of address. Must be verified domain. Defaults to
            `agentmail.to`.
        display_name:
          $ref: '#/components/schemas/inboxesDisplayName'
          nullable: true
        client_id:
          $ref: '#/components/schemas/inboxesClientId'
          nullable: true
        metadata:
          $ref: '#/components/schemas/inboxesMetadata'
          nullable: true
          description: Custom metadata to attach to the inbox.
    inboxesUpdateInboxRequest:
      title: inboxesUpdateInboxRequest
      type: object
      properties:
        display_name:
          $ref: '#/components/schemas/inboxesDisplayName'
          nullable: true
        metadata:
          $ref: '#/components/schemas/inboxesUpdateMetadata'
          nullable: true
          description: >-
            Metadata to merge into the inbox's existing metadata. Keys you
            include

            are added or overwritten; keys you omit are left unchanged. To
            remove a

            single key, send it with a null value. To clear all metadata, send

            `metadata` as null. Sending an empty object is rejected; use null to

            clear. Each update must include at least one of `display_name` or

            `metadata`.
    podsPodId:
      title: podsPodId
      type: string
      description: ID of pod.
    podsName:
      title: podsName
      type: string
      description: Name of pod.
    podsClientId:
      title: podsClientId
      type: string
      description: Client ID of pod.
    podsPod:
      title: podsPod
      type: object
      properties:
        pod_id:
          $ref: '#/components/schemas/podsPodId'
        name:
          $ref: '#/components/schemas/podsName'
        updated_at:
          type: string
          format: date-time
          description: Time at which pod was last updated.
        created_at:
          type: string
          format: date-time
          description: Time at which pod was created.
        client_id:
          $ref: '#/components/schemas/podsClientId'
          nullable: true
      required:
        - pod_id
        - name
        - updated_at
        - created_at
    podsListPodsResponse:
      title: podsListPodsResponse
      type: object
      properties:
        count:
          $ref: '#/components/schemas/Count'
        limit:
          $ref: '#/components/schemas/Limit'
          nullable: true
        next_page_token:
          $ref: '#/components/schemas/PageToken'
          nullable: true
        pods:
          type: array
          items:
            $ref: '#/components/schemas/podsPod'
          description: Ordered by `created_at` descending.
      required:
        - count
        - pods
    podsCreatePodRequest:
      title: podsCreatePodRequest
      type: object
      properties:
        name:
          $ref: '#/components/schemas/podsName'
          nullable: true
        client_id:
          $ref: '#/components/schemas/podsClientId'
          nullable: true
    webhooksWebhookId:
      title: webhooksWebhookId
      type: string
      description: ID of webhook.
    webhooksClientId:
      title: webhooksClientId
      type: string
      description: Client ID of webhook.
    webhooksUrl:
      title: webhooksUrl
      type: string
      description: URL of webhook endpoint.
    webhooksWebhook:
      title: webhooksWebhook
      type: object
      properties:
        webhook_id:
          $ref: '#/components/schemas/webhooksWebhookId'
        url:
          $ref: '#/components/schemas/webhooksUrl'
        event_types:
          $ref: '#/components/schemas/EventTypes'
          nullable: true
        pod_ids:
          $ref: '#/components/schemas/PodIds'
          nullable: true
        inbox_ids:
          $ref: '#/components/schemas/InboxIds'
          nullable: true
        secret:
          type: string
          description: Secret for webhook signature verification.
        enabled:
          type: boolean
          description: Webhook is enabled.
        updated_at:
          type: string
          format: date-time
          description: Time at which webhook was last updated.
        created_at:
          type: string
          format: date-time
          description: Time at which webhook was created.
        client_id:
          $ref: '#/components/schemas/webhooksClientId'
          nullable: true
      required:
        - webhook_id
        - url
        - secret
        - enabled
        - updated_at
        - created_at
    webhooksListWebhooksResponse:
      title: webhooksListWebhooksResponse
      type: object
      properties:
        count:
          $ref: '#/components/schemas/Count'
        limit:
          $ref: '#/components/schemas/Limit'
          nullable: true
        next_page_token:
          $ref: '#/components/schemas/PageToken'
          nullable: true
        webhooks:
          type: array
          items:
            $ref: '#/components/schemas/webhooksWebhook'
          description: Ordered by `created_at` descending.
      required:
