  /v0/pods/{pod_id}/threads:
    get:
      description: |-
        Lists threads in the pod, most recent first. Pass `senders`,
        `recipients`, or `subject` to filter by substring. Filtered requests are
        served by search, which caps `limit` at 100. For relevance-ranked
        full-text search, use `Search Threads`.

        **CLI:**
        ```bash
        agentmail pods:threads list --pod-id <pod_id>
        ```
      operationId: pods_threads_list
      tags:
        - PodsThreads
      parameters:
        - name: pod_id
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/podsPodId'
        - name: limit
          in: query
          required: false
          schema:
            $ref: '#/components/schemas/Limit'
            nullable: true
        - name: page_token
          in: query
          required: false
          schema:
            $ref: '#/components/schemas/PageToken'
            nullable: true
        - name: labels
          in: query
          required: false
          schema:
            $ref: '#/components/schemas/Labels'
            nullable: true
        - name: before
          in: query
          required: false
          schema:
            $ref: '#/components/schemas/Before'
            nullable: true
        - name: after
          in: query
          required: false
          schema:
            $ref: '#/components/schemas/After'
            nullable: true
        - name: ascending
          in: query
          required: false
          schema:
            $ref: '#/components/schemas/Ascending'
            nullable: true
        - name: include_spam
          in: query
          required: false
          schema:
            $ref: '#/components/schemas/IncludeSpam'
            nullable: true
        - name: include_blocked
          in: query
          required: false
          schema:
            $ref: '#/components/schemas/IncludeBlocked'
            nullable: true
        - name: include_unauthenticated
          in: query
          required: false
          schema:
            $ref: '#/components/schemas/IncludeUnauthenticated'
            nullable: true
        - name: include_trash
          in: query
          required: false
          schema:
            $ref: '#/components/schemas/IncludeTrash'
            nullable: true
        - name: senders
          in: query
          description: >-
            Filter to threads whose senders contain this value (substring
            match). Repeatable; all values must match.
          required: false
          schema:
            type: array
            items:
              type: string
            nullable: true
        - name: recipients
          in: query
          description: >-
            Filter to threads whose recipients contain this value (substring
            match). Repeatable; all values must match.
          required: false
          schema:
            type: array
            items:
              type: string
            nullable: true
        - name: subject
          in: query
          description: >-
            Filter to threads whose subject contains this value (substring
            match). Repeatable; all values must match.
          required: false
          schema:
            type: array
            items:
              type: string
            nullable: true
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListThreadsResponse'
        '404':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      summary: List Threads
      servers:
        - url: https://api.agentmail.to
        - url: https://x402.api.agentmail.to
        - url: https://mpp.api.agentmail.to
        - url: https://api.agentmail.eu
      security:
        - BearerAuth: []
