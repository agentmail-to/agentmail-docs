          $ref: '#/components/schemas/EventTypes'
          description: >-
            Full list of event types this webhook should receive. At least one
            type is required. Send every type you

            want in this array (not incremental). See [Webhooks
            overview](https://docs.agentmail.to/webhooks-overview)

            for spam, blocked, and unauthenticated events and required
            permissions.
        pod_ids:
          $ref: '#/components/schemas/PodIds'
          nullable: true
        inbox_ids:
          $ref: '#/components/schemas/InboxIds'
          nullable: true
        client_id:
          $ref: '#/components/schemas/webhooksClientId'
          nullable: true
      required:
        - url
        - event_types
    webhooksUpdateWebhookRequest:
      title: webhooksUpdateWebhookRequest
      type: object
      properties:
        add_inbox_ids:
          $ref: '#/components/schemas/InboxIds'
          nullable: true
          description: Inbox IDs to subscribe to the webhook.
        remove_inbox_ids:
          $ref: '#/components/schemas/InboxIds'
          nullable: true
          description: Inbox IDs to unsubscribe from the webhook.
        add_pod_ids:
          $ref: '#/components/schemas/PodIds'
          nullable: true
          description: Pod IDs to subscribe to the webhook.
        remove_pod_ids:
          $ref: '#/components/schemas/PodIds'
          nullable: true
          description: Pod IDs to unsubscribe from the webhook.
        event_types:
          $ref: '#/components/schemas/EventTypes'
          nullable: true
          description: >-
            When you send a non-empty list, it replaces the webhook's subscribed
            event types in full (the same

            "set the list" behavior as create). It is not a merge or diff:
            include every event type you want after

            the update. Sending a one-element array means the webhook will only
            receive that one type afterward.

            Omit this field or send an empty array to leave event types
            unchanged. Clearing all types with an empty

            list is not supported. Subscribing to `message.received.spam`,
            `message.received.blocked`, or

            `message.received.unauthenticated` requires the matching label
            permission on the API key.
    AgentSignupRequest:
      title: AgentSignupRequest
      type: object
      description: Request body to sign up an agent.
      properties:
        human_email:
          type: string
          description: >-
            Email address of the human who owns the agent. A 6-digit OTP will be
            sent to this address.
        username:
          type: string
          description: >-
            Username for the auto-created inbox (e.g. "my-agent" creates
            my-agent@agentmail.to).
        source:
          type: string
          nullable: true
          description: >-
            The SDK, framework, or platform issuing this sign-up (e.g.
            `agentmail-python`, `agentmail-cli`, `agentmail-mcp`).

            Identifies the caller — answers "who is signing up".

            Max 2048 characters.
        referrer:
          type: string
          nullable: true
          description: >-
            The channel that drove this sign-up — where the agent or its
            developer discovered AgentMail

            (e.g. `agent.email`, a partner URL, a campaign tag). Answers "where
            did this sign-up come from".

            Max 2048 characters.
      required:
        - human_email
        - username
    AgentSignupResponse:
      title: AgentSignupResponse
      type: object
      description: Response after successful agent sign-up.
      properties:
        organization_id:
          type: string
          description: ID of the created organization.
        inbox_id:
          type: string
          description: ID of the auto-created inbox.
        api_key:
          type: string
          description: >-
            API key for authenticating subsequent requests. Store this securely,
            it cannot be retrieved again.
      required:
        - organization_id
        - inbox_id
        - api_key
    AgentVerifyRequest:
      title: AgentVerifyRequest
