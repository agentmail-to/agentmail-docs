name: Fern Check

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  fern-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check generated MCP tool catalog
        run: python3 scripts/generate_mcp_tool_catalog.py --check

      - name: Install Fern
        run: npm install -g fern-api

      - name: Check API is valid
        run: fern check
