name: Sync to Stainless

on:
  push:
    branches:
      - main
    paths:
      - "fern/definition/**"
      - "fern/generators.yml"
      - "fern/api.yml"

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Fern
        run: npm install -g fern-api

      - name: Generate OpenAPI spec
        run: fern generate --group openapi --local
        env:
          FERN_TOKEN: ${{ secrets.FERN_TOKEN }}

      - name: Push to Stainless
        run: |
          SPEC_FILE=$(find openapi -name "openapi.*" -type f | head -1)
          SPEC_CONTENT=$(python3 -c "import sys,json; print(json.dumps({'openapi.json': {'content': open('$SPEC_FILE').read()}}))")
          curl -sf -X POST "https://api.stainless.com/v0/builds" \
            -H "Authorization: Bearer $STAINLESS_API_KEY" \
            -H "Content-Type: application/json" \
            -d "{\"project\": \"agentmail\", \"branch\": \"main\", \"revision\": $SPEC_CONTENT}"
        env:
          STAINLESS_API_KEY: ${{ secrets.STAINLESS_API_KEY }}
